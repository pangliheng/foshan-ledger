<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佛山客户网络台账</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="xlsx.min.js"></script>
<script>
if(typeof XLSX==='undefined'){
  var s=document.createElement('script');
  s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
  document.head.appendChild(s);
}
</script>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","Microsoft YaHei","微软雅黑",sans-serif;
  background:linear-gradient(160deg,#f0f4ff 0%,#faf6ff 30%,#f5f8ff 60%,#f0f9ff 100%);
  color:#1e293b;
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Subtle animated background orbs */
body::before{
  content:'';
  position:fixed;
  top:-20%;
  right:-10%;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(99,102,241,.06) 0%,transparent 70%);
  border-radius:50%;
  pointer-events:none;
  z-index:0;
  animation:float1 12s ease-in-out infinite;
}
body::after{
  content:'';
  position:fixed;
  bottom:-15%;
  left:-8%;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(16,185,129,.05) 0%,transparent 70%);
  border-radius:50%;
  pointer-events:none;
  z-index:0;
  animation:float2 15s ease-in-out infinite;
}
@keyframes float1{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(-30px,20px) scale(1.05)}
  66%{transform:translate(15px,-10px) scale(.97)}
}
@keyframes float2{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(25px,-15px) scale(1.06)}
  66%{transform:translate(-10px,20px) scale(.95)}
}

.wrap{max-width:1480px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1}

/* ===== Header ===== */
header{
  background:linear-gradient(135deg,#312e81 0%,#4338ca 30%,#6366f1 60%,#8b5cf6 100%);
  color:#fff;
  padding:28px 32px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(79,70,229,.25),0 2px 8px rgba(0,0,0,.06);
  margin-bottom:20px;
}
header::before{
  content:'';
  position:absolute;
  top:-60px;right:-60px;
  width:200px;height:200px;
  background:rgba(255,255,255,.06);
  border-radius:50%;
  pointer-events:none;
}
header::after{
  content:'';
  position:absolute;
  bottom:-40px;left:30%;
  width:160px;height:160px;
  background:rgba(255,255,255,.04);
  border-radius:50%;
  pointer-events:none;
}
header h1{
  font-size:26px;
  font-weight:700;
  letter-spacing:-.3px;
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:4px;
}
header h1 .logo-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:42px;height:42px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);
  border-radius:12px;
  font-size:20px;
}
header .sub{
  font-size:14px;
  opacity:.85;
  position:relative;
  z-index:1;
  letter-spacing:.3px;
}
header .meta{
  font-size:11px;
  opacity:.6;
  margin-top:8px;
  position:relative;
  z-index:1;
}
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
  position:relative;
  z-index:1;
}
.toolbar button{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(8px);
  color:#fff;
  border:1px solid rgba(255,255,255,.2);
  padding:9px 18px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  letter-spacing:.2px;
}
.toolbar button:hover{
  background:rgba(255,255,255,.22);
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  border-color:rgba(255,255,255,.35);
}

/* ===== Stats ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:20px;
}
.stat{
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:20px 22px;
  border:1px solid rgba(226,232,240,.8);
  box-shadow:0 2px 12px rgba(0,0,0,.03),0 1px 2px rgba(0,0,0,.04);
  transition:all .3s cubic-bezier(.4,0,.2,1);
  cursor:default;
  position:relative;
  overflow:hidden;
}
.stat:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
}
.stat::after{
  content:'';
  position:absolute;
  top:0;left:0;
  width:4px;height:100%;
  border-radius:4px 0 0 4px;
}
.stat.s1::after{background:linear-gradient(180deg,#6366f1,#818cf8)}
.stat.s2::after{background:linear-gradient(180deg,#10b981,#34d399)}
.stat.s3::after{background:linear-gradient(180deg,#f59e0b,#fbbf24)}
.stat.s4::after{background:linear-gradient(180deg,#8b5cf6,#a78bfa)}
.stat.s4.locked .num{font-size:24px;opacity:.5;cursor:pointer}
.stat.s4.locked{cursor:pointer}
.stat.s4.locked:hover .num{opacity:.8}
.stat.s4.unlocked .num{font-size:32px;opacity:1}
.stat .num{
  font-size:32px;
  font-weight:800;
  letter-spacing:-.5px;
  line-height:1;
  margin-bottom:6px;
}
.stat.s1 .num{color:#4338ca}
.stat.s2 .num{color:#047857}
.stat.s3 .num{color:#b45309}
.stat.s4 .num{color:#6d28d9}
.stat .lbl{
  font-size:12px;
  color:#64748b;
  font-weight:500;
  letter-spacing:.2px;
}
.stat .trend{
  font-size:11px;
  color:#94a3b8;
  margin-top:2px;
}

/* ===== Card ===== */
.card{
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:24px 28px;
  margin-bottom:18px;
  border:1px solid rgba(226,232,240,.7);
  box-shadow:0 2px 16px rgba(0,0,0,.03),0 1px 3px rgba(0,0,0,.04);
  transition:box-shadow .3s;
}
.card:hover{
  box-shadow:0 4px 20px rgba(0,0,0,.04),0 2px 6px rgba(0,0,0,.05);
}
.card h2{
  font-size:16px;
  color:#1e293b;
  margin-bottom:18px;
  padding-bottom:12px;
  border-bottom:1px solid rgba(226,232,240,.8);
  display:flex;
  align-items:center;
  justify-content:space-between;
  letter-spacing:-.2px;
}
.card h2 .h2-tip{
  font-size:12px;
  color:#94a3b8;
  font-weight:400;
}

/* ===== Form ===== */
.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px 16px;
}
.form-group{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.form-group.full{grid-column:1/-1}
.form-group label{
  font-size:12.5px;
  color:#475569;
  font-weight:600;
  letter-spacing:.2px;
}
.req{color:#ef4444;margin-left:2px}
.form-group input,
.form-group select,
.form-group textarea{
  padding:10px 14px;
  border:1.5px solid #e2e8f0;
  border-radius:10px;
  font-size:13.5px;
  outline:none;
  background:#fafbfd;
  font-family:inherit;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  color:#1e293b;
}
.form-group input:hover{border-color:#cbd5e1}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  border-color:#6366f1;
  background:#fff;
  box-shadow:0 0 0 3px rgba(99,102,241,.1),0 1px 2px rgba(0,0,0,.04);
}
.form-group input::placeholder{color:#94a3b8}
.quick-specs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:2px;
}
.quick-specs button{
  background:linear-gradient(135deg,#eef2ff,#e0e7ff);
  color:#4338ca;
  border:1px solid #c7d2fe;
  padding:5px 12px;
  border-radius:8px;
  font-size:11.5px;
  cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  font-weight:500;
}
.quick-specs button:hover{
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:#fff;
  border-color:transparent;
  transform:translateY(-1px);
  box-shadow:0 2px 8px rgba(99,102,241,.3);
}

/* ===== Buttons ===== */
.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
  flex-wrap:wrap;
  align-items:center;
}
.btn-primary,.btn-success,.btn-warn,.btn-ghost{
  padding:10px 22px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-size:13.5px;
  font-weight:600;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  display:inline-flex;
  align-items:center;
  gap:6px;
  letter-spacing:.2px;
}
.btn-primary{
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:#fff;
  box-shadow:0 2px 8px rgba(99,102,241,.25);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#4f46e5,#4338ca);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(99,102,241,.35);
}
.btn-success{
  background:linear-gradient(135deg,#10b981,#059669);
  color:#fff;
  box-shadow:0 2px 8px rgba(16,185,129,.25);
}
.btn-success:hover{
  background:linear-gradient(135deg,#059669,#047857);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(16,185,129,.35);
}
.btn-warn{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff;
  box-shadow:0 2px 8px rgba(245,158,11,.25);
}
.btn-warn:hover{
  background:linear-gradient(135deg,#d97706,#b45309);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(245,158,11,.35);
}
.btn-ghost{
  background:#f1f5f9;
  color:#475569;
  border:1px solid #e2e8f0;
}
.btn-ghost:hover{
  background:#e2e8f0;
  border-color:#cbd5e1;
}

/* ===== Notice ===== */
.notice{
  background:linear-gradient(135deg,#fffbeb,#fef3c7);
  border:1px solid #fde68a;
  border-radius:12px;
  padding:12px 18px;
  margin-bottom:18px;
  font-size:12.5px;
  color:#78350f;
  line-height:1.7;
}
.kbd{
  background:#fff;
  border:1px solid #cbd5e1;
  border-bottom-width:2px;
  border-radius:5px;
  padding:2px 7px;
  font-family:"SF Mono","Cascadia Code","Fira Code",ui-monospace,Menlo,monospace;
  font-size:11px;
  color:#475569;
  font-weight:500;
}

/* ===== Filter ===== */
.filter-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:16px;
}
.filter-bar input,.filter-bar select{
  padding:10px 14px;
  border:1.5px solid #e2e8f0;
  border-radius:10px;
  font-size:13px;
  outline:none;
  background:#fff;
  transition:all .2s;
  color:#1e293b;
}
.filter-bar input:focus,.filter-bar select:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,.08);
}
.filter-bar input::placeholder{color:#94a3b8}
.filter-bar .grow{flex:1;min-width:200px}

/* ===== Spec Distribution ===== */
.spec-dist{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}
.spec-pill{
  background:linear-gradient(135deg,#eef2ff,#e0e7ff);
  color:#4338ca;
  padding:5px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
  border:1px solid #c7d2fe;
  transition:all .2s;
}
.spec-pill:hover{
  background:linear-gradient(135deg,#c7d2fe,#b0befa);
  transform:translateY(-1px);
}

/* ===== Table ===== */
.tbl-wrap{
  max-height:560px;
  overflow:auto;
  border-radius:14px;
  border:1px solid #e2e8f0;
  background:#fff;
  margin-top:14px;
}
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:13px;
}
thead{position:sticky;top:0;z-index:5}
th{
  background:linear-gradient(180deg,#1e293b,#334155);
  color:#f1f5f9;
  padding:13px 11px;
  text-align:left;
  font-weight:600;
  font-size:12px;
  white-space:nowrap;
  letter-spacing:.3px;
  border-bottom:2px solid #1e293b;
}
th:first-child{border-radius:14px 0 0 0}
th:last-child{border-radius:0 14px 0 0}
td{
  padding:10px 11px;
  border-bottom:1px solid #f1f5f9;
  vertical-align:top;
  font-size:12.5px;
  transition:background .15s;
}
tr:last-child td:first-child{border-radius:0 0 0 14px}
tr:last-child td:last-child{border-radius:0 0 14px 0}
tr:nth-child(even) td{background:#fafbfd}
tr.row-new td{background:linear-gradient(90deg,#ecfdf5,#f0fdf4)}
tr.row-new:nth-child(even) td{background:linear-gradient(90deg,#d1fae5,#dcfce7)}
tr:hover td{background:#eef2ff!important}
tr.row-new:hover td{background:#dbeafe!important}
.row-new-badge{
  background:linear-gradient(135deg,#10b981,#059669);
  color:#fff;
  font-size:9px;
  padding:2px 7px;
  border-radius:6px;
  margin-left:5px;
  font-weight:600;
}
.del-btn{
  padding:5px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:11.5px;
  border:1px solid #fecaca;
  background:#fff;
  color:#dc2626;
  font-weight:500;
  transition:all .18s;
}
.del-btn:hover{
  background:#dc2626;
  color:#fff;
  border-color:#dc2626;
  box-shadow:0 2px 6px rgba(220,38,38,.25);
}
.empty{
  text-align:center;
  padding:80px 20px;
  color:#94a3b8;
}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.3}

/* ===== Toast ===== */
.toast{
  position:fixed;
  top:24px;
  right:24px;
  background:linear-gradient(135deg,#1e293b,#334155);
  color:#f1f5f9;
  padding:14px 24px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  z-index:1000;
  transform:translateX(420px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  font-size:13.5px;
  font-weight:500;
  letter-spacing:.2px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
}
.toast.show{transform:translateX(0)}
.toast.success{background:linear-gradient(135deg,#059669,#047857)}
.toast.error{background:linear-gradient(135deg,#dc2626,#b91c1c)}

/* ===== Image Modal ===== */
.img-btn{
  font-size:10.5px;
  padding:4px 10px;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  color:#059669;
  border:1px solid #bbf7d0;
  border-radius:6px;
  cursor:pointer;
  font-weight:500;
  transition:all .18s;
}
.img-btn:hover{
  background:linear-gradient(135deg,#10b981,#059669);
  color:#fff;
  border-color:transparent;
}
.img-del-btn{
  font-size:9.5px;
  padding:2px 6px;
  background:#fff;
  color:#dc2626;
  border:1px solid #fecaca;
  border-radius:4px;
  cursor:pointer;
  transition:all .15s;
}
.img-del-btn:hover{background:#dc2626;color:#fff}

/* ===== Responsive ===== */
@media(max-width:1024px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .stats{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  header{padding:20px}
  header h1{font-size:20px}
  .card{padding:18px}
  .toolbar button{font-size:12px;padding:7px 12px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
<h1><span class="logo-icon">📋</span>佛山客户网络台账 <span style="font-size:12px;opacity:.6;font-weight:400">v6.25</span></h1>
<div class="sub">开户即录 · 一键导出 · 本地安全存储</div>
<div class="meta" id="storageInfo">💾 数据自动保存在浏览器本地</div>
<div class="toolbar">
<button onclick="doImport()">📂 导入原表（Excel/CSV）</button>
<button onclick="loadDemo()">📊 载入演示数据</button>
<button onclick="doExport()">📥 导出CSV</button>
<button onclick="clearAll()">🗑️ 清空</button>
<input type="file" id="fileInput" accept=".xls,.xlsx,.csv,.tsv" onchange="handleFile(event)" style="display:none">
<input type="file" id="imgInput" accept="image/*" onchange="handleImg(event)" style="display:none">
</div>
</header>

<div class="stats">
<div class="stat s1"><div class="num" id="statTotal">0</div><div class="lbl">总客户数</div><div class="trend">全部记录</div></div>
<div class="stat s2"><div class="num" id="statNew">0</div><div class="lbl">本次新增</div><div class="trend">未保存的新记录</div></div>
<div class="stat s3"><div class="num" id="statMonth">0</div><div class="lbl">本月开户</div><div class="trend">当月新增客户</div></div>
<div class="stat s4" id="feeCard" onclick="unlockFee(event)"><div class="num" id="statFee">🔒</div><div class="lbl">总收入 <span id="feeLockIcon" style="font-size:11px">🔒</span></div><div class="trend" id="feeTrend">点击解锁查看</div></div>
</div>

<div class="card">
<h2>📝 新增客户 <span class="h2-tip">快捷键 <span class="kbd">Ctrl+Enter</span> 快速提交</span></h2>
<div class="notice">💡 <b>使用提示：</b>开户时间默认今天，手机号11位；<b>导入</b>支持 .xls / .xlsx / .csv 文件拖入或选择。</div>
<form id="entryForm" onsubmit="return addRow(event)">
<div class="form-grid">
<div class="form-group"><label>📅 开户时间 <span class="req">*</span></label><input type="date" id="f_date" required></div>
<div class="form-group"><label>📱 手机号 <span class="req">*</span></label><input type="text" id="f_phone" placeholder="11位手机号" maxlength="11" required></div>
<div class="form-group"><label>👤 客户信息</label><input type="text" id="f_name" placeholder="客户姓名（选填）"></div>
<div class="form-group"><label>🔢 产品编码 <span class="req">*</span></label><input type="text" id="f_code" placeholder="如：075700787972" required></div>
<div class="form-group"><label>📶 宽带规格 <span class="req">*</span></label>
<input type="text" id="f_spec" placeholder="如：1000M/100M" required>
<div class="quick-specs">
<button type="button" onclick="$('f_spec').value='100M光纤'">100M</button>
<button type="button" onclick="$('f_spec').value='200M光纤'">200M</button>
<button type="button" onclick="$('f_spec').value='500M光纤'">500M</button>
<button type="button" onclick="$('f_spec').value='1000M/100M'">1000M</button>
<button type="button" onclick="$('f_spec').value='移动990套餐'">移动990</button>
<button type="button" onclick="$('f_spec').value='电信199套餐'">电信199</button>
</div>
</div>
<div class="form-group"><label>💰 网络费用</label><input type="text" id="f_fee" placeholder="如：200元"></div>
<div class="form-group full"><label>📍 安装地址 <span class="req">*</span></label><input type="text" id="f_addr" placeholder="详细安装地址" required></div>
<div class="form-group full"><label>📝 备注及维护成本</label><input type="text" id="f_note" placeholder="如：免维护费1年 / 套餐详情"></div>
</div>
<div class="actions">
<button type="submit" class="btn-primary">➕ 添加到台账（<span class="kbd">Ctrl+Enter</span>）</button>
<button type="button" class="btn-ghost" onclick="resetForm()">↺ 重置表单</button>
<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b;margin-left:auto;cursor:pointer;user-select:none">
<input type="checkbox" id="autoNext" checked style="accent-color:#6366f1;width:16px;height:16px"> 提交后自动清空
</label>
</div>
</form>
</div>

<div class="card">

<script>
// ===== 核心数据结构 =====
var H = ['开户时间','客户信息','手机号','宽带产品编码','安装地址','宽带规格','网络费用','备注及维护成本备注'];
var SK = 'kd_ledger_v4';
var rows = [];
var initialCount = 0;
var totalFee = 0;
var feeUnlocked = false;
var FEE_PW = '198654';  // 默认密码，可自行修改

// ===== 工具函数 =====
function $(id){return document.getElementById(id)}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowStr(){return new Date().toLocaleString('zh-CN',{hour12:false})}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg,type){var t=$('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(function(){t.className='toast'},2200)}

// ===== 本地存储 =====
function save(){

  return false;
}

// ===== 日期转换（纯数学算法，不依赖 Date 对象） =====
function isLeap(y){return(y%4===0&&y%100!==0)||(y%400===0)}
function excelSerialToYMD(serial){
  var d=Math.floor(serial)-1; // 距离1900-01-01的天数
  if(serial>60)d-=1; // Excel 闰年bug修正（1900年不是闰年但Excel认为是）
  var y=1900;
  while(true){var diy=365+(isLeap(y)?1:0);if(d<diy)break;d-=diy;y++;}
  var mdays=[31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31];
  var m=0;while(d>=mdays[m]){d-=mdays[m];m++;}
  return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d+1).padStart(2,'0');
}
function dateConv(v){
  if(v==null||v==='')return '';
  var ts=Object.prototype.toString.call(v);
  if(ts==='[object Date]'||(v instanceof Date)){
    if(isNaN(v.getTime()))return '';
    return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  }
  if(typeof v==='number'&&!isNaN(v)&&v>0&&v<100000){
    return excelSerialToYMD(v);
  }
  if(typeof v==='string'){
    var m=v.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
    if(m)return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
    var m2=v.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if(m2)return m2[1]+'-'+String(m2[2]).padStart(2,'0')+'-'+String(m2[3]).padStart(2,'0');
    return v.trim();
  }
  try{var d2=new Date(v);if(!isNaN(d2.getTime()))return d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');}catch(e){}
  return String(v);
}

// 列名 → 索引映射
var COL_MAP = {};
(function(){
  var m={
    '开户时间':0,'开户日期':0,'日期':0,'date':0,
    '客户信息':1,'客户姓名':1,'姓名':1,'客户':1,'name':1,
    '手机号':2,'手机':2,'联系电话':2,'电话':2,'联系方式':2,'phone':2,'tel':2,
    '宽带产品编码':3,'宽带产品号码':3,'产品编码':3,'产品号码':3,'宽带编码':3,'code':3,'产品':3,
    '安装地址':4,'地址':4,'装机地址':4,'addr':4,'address':4,
    '宽带规格':5,'宽带带宽':5,'规格':5,'带宽':5,'spec':5,'speed':5,
    '网络费用':6,'报装金额':6,'安装费用':6,'费用':6,'金额':6,'价格':6,'fee':6,'price':6,'收费':6,
    '备注及维护成本备注':7,'（备注）宽带成本':7,'备注':7,'宽带成本':7,'维护成本备注':7,'维护成本':7,'成本备注':7,'note':7,'remark':7
  };
  for(var k in m){if(m.hasOwnProperty(k))COL_MAP[k]=m[k]}
})();

function mapHeader(name){
  var s=String(name||'').trim().replace(/[\s\u00a0\u3000]+/g,'').toLowerCase();
  for(var k in COL_MAP){if(k.toLowerCase()===s)return COL_MAP[k]}
  for(var k in COL_MAP){if(k.toLowerCase().indexOf(s)>=0||s.indexOf(k.toLowerCase())>=0)return COL_MAP[k]}
  return -1;
}

function mapRow(rowData, colIdxMap){
  var arr=['','','','','','','',''];
  for(var i=0;i<colIdxMap.length;i++){
    var ci=colIdxMap[i];
    if(ci>=0&&ci<8){
      var v=rowData[i];
      if(ci===0)v=dateConv(v);
      else if(ci===2&&typeof v==='number')v=String(Math.round(v));
      else if(v==null)v='';
      arr[ci]=String(v);
    }
  }
  return arr;
}

// ===== 导入 =====
function doImport(){$('fileInput').click()}

function handleFile(e){
  var file=e.target.files[0];if(!file)return;
  var name=file.name.toLowerCase();
  if(name.endsWith('.xls')||name.endsWith('.xlsx')){
    if(typeof XLSX==='undefined'){toast('Excel解析库未加载，请检查网络','error');e.target.value='';return}
    var r2=new FileReader();
    r2.onload=function(ev){
      try{
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',raw:true});
        var aoa=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:'',raw:true});
        importData(aoa,file.name);
      }catch(err){toast('导入失败：'+err.message,'error');console.error(err)}
    };
    r2.readAsArrayBuffer(file);
  }else{
    var r1=new FileReader();
    r1.onload=function(ev){
      var text=ev.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.substring(1);
      var delim=text.indexOf('\t')>=0?'\t':',';
      var lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
      var aoa=lines.map(function(l){return parseCSV(l,delim)});
      importData(aoa,file.name);
    };
    r1.readAsText(file,'UTF-8');
  }
  e.target.value='';
}

function parseCSV(line,delim){
  var r=[],c='',q=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(q){if(ch==='"'){if(line[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}
    else{if(ch==='"')q=true;else if(ch===delim){r.push(c);c=''}else c+=ch}
  }
  r.push(c);return r;
}

function importData(aoa, fileName){
  aoa=aoa.filter(function(r){return r.some(function(c){return c!=null&&String(c).trim()!==''})});
  if(aoa.length<2){toast('文件为空','error');return}
  var hIdx=-1;
  for(var i=0;i<Math.min(10,aoa.length);i++){
    var matchCount=0;
    var row=aoa[i];
    for(var j=0;j<row.length;j++){
      var s=String(row[j]||'').trim();
      if(s.length>0 && s.length<20 && mapHeader(s)>=0) matchCount++;
    }
    if(matchCount>=2){hIdx=i;break}
  }
  if(hIdx<0){toast('未找到表头行（需包含"开户时间"或"手机号"列）','error');return}
  var headerRow=aoa[hIdx];
  var colIdxMap=[];
  for(var c=0;c<headerRow.length;c++){colIdxMap.push(mapHeader(headerRow[c]))}
  var imported=0;
  for(var r=hIdx+1;r<aoa.length;r++){
    var arr=mapRow(aoa[r],colIdxMap);
    if(arr.every(function(v){return!v}))continue;
    rows.push({d:arr,_ts:Date.now(),_new:false});
    imported++;
  }
  initialCount=rows.length;
  // 导入后重置筛选器，确保所有数据可见
  $('filterMonth').value='';
  $('searchInput').value='';
  $('filterName').value='';
  renderTable();updateStats();save();
  toast('✓ 导入了 '+imported+' 条', 'success');
}

// ===== 表单 =====
function getFormData(){
  return {d:[
    $('f_date').value,                        // 0: 开户时间
    ($('f_name').value||'').trim(),           // 1: 客户信息
    $('f_phone').value.trim(),                // 2: 手机号
    $('f_code').value.trim(),                 // 3: 产品编码
    $('f_addr').value.trim(),                 // 4: 安装地址
    $('f_spec').value.trim(),                 // 5: 宽带规格
    $('f_fee').value.trim(),                  // 6: 网络费用
    $('f_note').value.trim()                  // 7: 备注
  ],_ts:Date.now(),_new:true};
}
function resetForm(){$('entryForm').reset();$('f_date').value=today();$('f_phone').focus()}
function addRow(e){
  e.preventDefault();
  var obj=getFormData();
  var req=[0,2,3,4,5];  // 必填：开户时间、手机号、产品编码、安装地址、宽带规格
  var missing=[];
  req.forEach(function(i){if(!obj.d[i])missing.push(H[i])});
  if(missing.length){toast('请填写：'+missing.join('、'),'error');return false}
  if(!/^\d{11}$/.test(obj.d[2])){toast('手机号需11位数字','error');return false}
  rows.push(obj);
  renderTable();updateStats();save();
  toast('✓ 已添加：'+obj.d[2],'success');
  if($('autoNext').checked)resetForm();
  return false;
}

// ===== 表格渲染 =====
function renderTable(){
  var search=$('searchInput').value.trim().toLowerCase();
  var fname=$('filterName').value.trim().toLowerCase();
  var fm=$('filterMonth').value;

  var data=rows.map(function(r,i){return{r:r,idx:i}}).filter(function(x){
    var d=x.r.d;
    if(fm&&d[0]&&(d[0]||'').substring(5,7)!==fm)return false;
    if(search){var s=search;var hit=(d[1]||'').indexOf(s)>=0||(d[3]||'').toLowerCase().indexOf(s)>=0||(d[2]||'').indexOf(s)>=0;if(!hit)return false}
    if(fname&&(d[1]||'').indexOf(fname)<0)return false;
    return true;
  });

  $('tblCount').textContent=rows.length+' / 显示 '+data.length;
  var tbody=$('tbody');
  if(data.length===0){
    tbody.innerHTML='<tr><td colspan="10" class="empty"><div class="icon">🔍</div>'+(rows.length===0?'暂无数据':'没有匹配的记录')+'</td></tr>';
    return;
  }
  var h='';
  for(var i=0;i<data.length;i++){
    var r=data[i].r;
    var d=r.d;
    var idx=data[i].idx;
    h+='<tr'+(r._new?' class="row-new"':'')+'>';
    h+='<td>'+(i+1)+'</td>';
    h+='<td><span style="cursor:pointer" onclick="editCell('+idx+',0)" title="点击编辑">'+esc(d[0])+'</span></td>';
    h+='<td><b><span style="cursor:pointer" onclick="editCell('+idx+',1)" title="点击编辑">'+esc(d[1])+'</span></b></td>';
    h+='<td><span style="cursor:pointer" onclick="editCell('+idx+',2)" title="点击编辑">'+esc(d[2])+'</span></td>';
    h+='<td><span style="cursor:pointer" onclick="editCell('+idx+',3)" title="点击编辑" style="font-family:monospace;font-size:11px">'+esc(d[3])+'</span></td>';
    h+='<td><span style="cursor:pointer" onclick="editCell('+idx+',4)" title="点击编辑">'+esc(d[4])+'</span></td>';
    h+='<td><span style="cursor:pointer" onclick="editCell('+idx+',5)" title="点击编辑">'+esc(d[5])+'</span></td>';
    h+='<td><span style="cursor:pointer;color:#dc2626;font-weight:600" onclick="editCell('+idx+',6)" title="点击编辑">'+esc(d[6])+'</span></td>';
    h+='<td><span style="cursor:pointer;max-width:200px;font-size:11px;color:#64748b" onclick="editCell('+idx+',7)" title="点击编辑">'+esc(d[7])+'</span>';
    if(r.img){
      h+='<br><img src="'+r.img+'" onclick="showImg('+idx+')" style="max-width:60px;max-height:60px;border-radius:8px;cursor:pointer;border:1.5px solid #e2e8f0;margin-top:6px" title="点击查看大图">';
      h+=' <button class="img-del-btn" onclick="event.stopPropagation();delImg('+idx+')">✕</button>';
    }
    h+=' <button class="img-btn" onclick="event.stopPropagation();uploadImg('+idx+')">📷 设备图</button>';
    h+='</td>';
    h+='<td><button class="del-btn" onclick="deleteRow('+idx+')">删除</button></td>';
    h+='</tr>';
  }
  tbody.innerHTML=h;
}

function deleteRow(idx){
  if(!confirm('确定删除第'+(idx+1)+'条记录？'))return;
  rows.splice(idx,1);renderTable();updateStats();save();toast('已删除','success');
}
function editCell(idx,col){
  var d=rows[idx].d;
  var oldVal=d[col]||'';
  var labels=['开户时间','客户信息','手机号','产品编码','安装地址','宽带规格','网络费用','备注'];
  var newVal=prompt('修改：'+labels[col],oldVal);
  if(newVal===null)return;
  newVal=newVal.trim();
  if(newVal===oldVal)return;
  d[col]=newVal;
  renderTable();updateStats();save();
  toast('已更新：'+labels[col]+' → '+newVal,'success');
}

// ===== 图片功能 =====
var _curImgIdx = -1;
function uploadImg(idx){
  _curImgIdx = idx;
  document.getElementById('imgInput').click();
}
function handleImg(e){
  var file = e.target.files[0];
  if(!file)return;
  if(file.size > 5*1024*1024){toast('图片不能超过5MB','error');e.target.value='';return}
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas');
      var maxW = 400, maxH = 300;
      var ratio = Math.min(maxW/img.width, maxH/img.height, 1);
      c.width = img.width * ratio;
      c.height = img.height * ratio;
      var ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, c.width, c.height);
      var base64 = c.toDataURL('image/jpeg', 0.65);
      rows[_curImgIdx].img = base64;
      renderTable(); save();
      toast('✓ 设备图片已添加','success');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function showImg(idx){
  var r = rows[idx];
  if(!r.img)return;
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:pointer';
  ov.onclick = function(){document.body.removeChild(ov)};
  var img = document.createElement('img');
  img.src = r.img;
  img.style.cssText = 'max-width:90%;max-height:90%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.4)';
  img.onclick = function(e){e.stopPropagation()};
  ov.appendChild(img);
  document.body.appendChild(ov);
}
function delImg(idx){
  if(!confirm('确定删除设备图片？'))return;
  delete rows[idx].img;
  renderTable(); save();
  toast('图片已删除','success');
}

// ===== 统计 =====
function updateStats(){
  $('statTotal').textContent=rows.length;
  $('statNew').textContent=Math.max(0,rows.length-initialCount);
  var tm=today().substring(0,7);
  var mc=0,fee=0;
  for(var i=0;i<rows.length;i++){
    if((rows[i].d[0]||'').substring(0,7)===tm)mc++;
    var f=parseFloat(String(rows[i].d[6]||'0').replace(/[^\d.]/g,''));
    if(!isNaN(f))fee+=f;
  }
  $('statMonth').textContent=mc;
  // 总收入处理（密码保护）
  totalFee = fee;
  if(feeUnlocked){
    $('statFee').textContent='¥'+fee.toLocaleString('zh-CN',{maximumFractionDigits:0});
    $('feeCard').className='stat s4 unlocked';
    $('feeLockIcon').textContent='🔓';
    $('feeTrend').textContent='已解锁 · 点击重新锁定';
  } else {
    $('statFee').textContent='🔒';
    $('feeCard').className='stat s4 locked';
    $('feeLockIcon').textContent='🔒';
    $('feeTrend').textContent='点击解锁查看';
  }
  var dist={};rows.forEach(function(r){var s=r.d[5]||'未填';dist[s]=(dist[s]||0)+1});
  $('specDist').innerHTML=Object.keys(dist).sort(function(a,b){return dist[b]-dist[a]}).map(function(s){return'<span class="spec-pill">'+esc(s)+' × '+dist[s]+'</span>'}).join('');
}
function clearFilter(){$('searchInput').value='';$('filterName').value='';$('filterMonth').value='';renderTable()}

// ===== 总收入密码保护 =====
function unlockFee(e){
  e.stopPropagation();
  if(feeUnlocked){
    // 已解锁 → 重新锁定
    feeUnlocked = false;
    updateStats();
    toast('已锁定总收入','success');
    return;
  }
  // 未解锁 → 输入密码
  var pw = prompt('请输入密码查看总收入：');
  if(pw === null) return;
  if(pw === FEE_PW){
    feeUnlocked = true;
    updateStats();
    toast('✓ 总收入已显示','success');
  } else {
    toast('密码错误！','error');
  }
}

// ===== 导出 =====
function escapeCSV(v){v=String(v==null?'':v).replace(/"/g,'""');if(v.indexOf(',')>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0)v='"'+v+'"';return v}
function doExport(){
  if(rows.length===0){toast('暂无数据','error');return}
  var lines=[H.map(escapeCSV).join(',')];
  rows.forEach(function(r){lines.push(r.d.map(escapeCSV).join(','))});
  var blob=new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=today().substring(0,7)+'在网台账.csv';document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href)},1500);
  toast('✓ 导出 '+rows.length+' 条','success');
}
